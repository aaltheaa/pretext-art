<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pretext art</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <span class="logo">pretext art</span>
    <nav>
      <button class="tab active" data-tab="museum">museum</button>
      <button class="tab" data-tab="bakery">bakery</button>
      <button class="tab" data-tab="binary">binary</button>
      <button class="tab" data-tab="word-pool">word pool</button>
      <button class="tab" data-tab="dragon">dragon</button>
      <button class="tab" data-tab="motivation">motivation</button>
    </nav>
  </header>
  <div class="canvas-wrapper">
    <canvas id="canvas"></canvas>
    <div id="motivation-overlay" class="motivation-overlay hidden">
      <div class="motivation-quote">
        <p class="motivation-text"></p>
        <p class="motivation-author"></p>
      </div>
    </div>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
